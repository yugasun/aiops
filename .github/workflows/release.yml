name: Release

on:
  push:
    branches: [main]

  workflow_dispatch:
    inputs:
      version:
        description: Override version (default reads skills/manifest.json)
        required: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Verify bundle
        run: bash scripts/verify.sh

      - name: Run tests
        run: |
          node scripts/test/sync-version.test.js
          node scripts/test/resolve-release-ref.test.js
          node scripts/test/adapters.test.js
          node scripts/test/hooks-merge.test.js
          node scripts/test/install-args.test.js
          node scripts/test/package-files.test.js
          node scripts/test/uninstall-skills.test.js
          python3 skills/aiops/scripts/test_router.py

      - name: Prepare release
        id: prep
        run: |
          set -euo pipefail

          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=$(jq -r .version skills/manifest.json)
          fi
          TAG="v${VERSION}"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists — skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${{ github.event_name }}" = "push" ]; then
            PREV=$(git show HEAD~1:skills/manifest.json 2>/dev/null | jq -r .version || echo "")
            if [ "$PREV" = "$VERSION" ]; then
              echo "Version unchanged ($VERSION) — skipping"
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Create tag and GitHub release
        if: steps.prep.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ steps.prep.outputs.tag }}"
          VERSION="${{ steps.prep.outputs.version }}"
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || true)

          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log "${PREV_TAG}..HEAD" --pretty=format:'- %s (%h)' --no-merges)
          else
            NOTES="Release ${VERSION}"
          fi

          gh release create "$TAG" \
            --title "aiops ${TAG}" \
            --notes "$NOTES"
