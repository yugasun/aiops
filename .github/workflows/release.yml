name: Release

on:
  push:
    branches: [main]

  workflow_dispatch:
    inputs:
      version:
        description: Override version (default auto-bumps from feat/fix commits)
        required: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Verify bundle
        run: bash scripts/verify.sh

      - name: Run tests
        run: |
          node scripts/test/sync-version.test.js
          node scripts/test/bump-from-commits.test.js
          node scripts/test/resolve-release-ref.test.js
          node scripts/test/adapters.test.js
          node scripts/test/hooks-merge.test.js
          node scripts/test/install-args.test.js
          node scripts/test/agents-md.test.js
          node scripts/test/prompts.test.js
          node scripts/test/skills-shared-path.test.js
          node scripts/test/package-files.test.js
          node scripts/test/uninstall-skills.test.js
          python3 skills/aiops/scripts/test_router.py

      - name: Prepare release
        id: prep
        run: |
          set -euo pipefail

          # Avoid release loop on the bot commit
          HEAD_MSG=$(git log -1 --pretty=%s)
          if [[ "$HEAD_MSG" == chore\(release\):* ]]; then
            echo "Head is release commit — skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          MANUAL_BUMP=false
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
            MANUAL_BUMP=true
          elif [ "${{ github.event_name }}" = "push" ]; then
            CUR=$(jq -r .version skills/manifest.json)
            PREV=$(git show HEAD~1:skills/manifest.json 2>/dev/null | jq -r .version || echo "")
            if [ -n "$PREV" ] && [ "$PREV" != "$CUR" ]; then
              # PR already bumped version files — release that version
              VERSION="$CUR"
              MANUAL_BUMP=true
              echo "Using version already bumped in commit: $VERSION"
            fi
          fi

          if [ "$MANUAL_BUMP" != "true" ]; then
            BUMP=$(node scripts/bump-from-commits.js --print-bump)
            if [ "$BUMP" = "none" ]; then
              echo "No feat/fix/breaking commits since last tag — skipping"
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            VERSION=$(node scripts/bump-from-commits.js --print-version)
            echo "Auto-bump ($BUMP) → $VERSION"
            echo "auto_bump=true" >> "$GITHUB_OUTPUT"
          else
            echo "auto_bump=false" >> "$GITHUB_OUTPUT"
          fi

          TAG="v${VERSION}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists — skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Sync version files
        if: steps.prep.outputs.skip != 'true'
        run: node scripts/sync-version.js "${{ steps.prep.outputs.version }}"

      - name: Commit version bump, tag, and push
        if: steps.prep.outputs.skip != 'true'
        run: |
          set -euo pipefail
          VERSION="${{ steps.prep.outputs.version }}"
          TAG="${{ steps.prep.outputs.tag }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add skills/manifest.json package.json \
            .claude-plugin/plugin.json .claude-plugin/marketplace.json

          if git diff --cached --quiet; then
            echo "Version files already at $VERSION"
          else
            git commit -m "chore(release): v${VERSION} [skip ci]"
          fi

          git tag "$TAG"
          git push origin "HEAD:${{ github.ref_name }}"
          git push origin "$TAG"

      - name: Create GitHub release
        if: steps.prep.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ steps.prep.outputs.tag }}"
          VERSION="${{ steps.prep.outputs.version }}"
          PREV_TAG=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || true)

          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log "${PREV_TAG}..${TAG}" --pretty=format:'- %s (%h)' --no-merges)
          else
            NOTES="Release ${VERSION}"
          fi

          gh release create "$TAG" \
            --title "aiops ${TAG}" \
            --notes "$NOTES"
